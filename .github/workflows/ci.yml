name: ci

on: push

env:
  BUNDLE_PATH: ~/.bundle/gems

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Redmine
        uses: actions/checkout@v4
        with:
          ref: 6.0-stable
          repository: redmine/redmine

      - name: Checkout Techradar
        uses: actions/checkout@v4
        with:
          path: plugins/redmine_techradar
          repository: renuo/redmine_techradar

      - name: Restore cache
        uses: actions/cache@v4
        with:
          key: gems-${{ hashFiles('Gemfile') }}
          restore-keys: gems
          path: ~/.bundle/gems

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
          ruby-version: 3.3

      - name: Set up Techradar
        run: bin/setup
        working-directory: plugins/redmine_techradar

      - name: Run linters
        run: bin/fastcheck
        working-directory: plugins/redmine_techradar

      - name: Run tests
        run: bin/check
        working-directory: plugins/redmine_techradar
